<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMF Tracker &amp; Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#10233A;
    --navy-panel:#16304E;
    --paper:#F6F3EA;
    --paper-dim:#EAE6D8;
    --amber:#C89B3C;
    --amber-dim:#8f7027;
    --olive:#5B7553;
    --rust:#A64B3C;
    --slateblue:#4A6C8C;
    --ink:#1B2430;
    --ink-soft:#5A6472;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--navy);
    color:var(--paper);
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:980px;margin:0 auto;padding:28px 20px 60px;}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:1px solid rgba(246,243,234,0.15);padding-bottom:18px;margin-bottom:22px;}
  header h1{font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:1.7rem;margin:0;letter-spacing:0.2px;}
  header .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--amber);margin-bottom:4px;display:block;}
  .tabbar{display:flex;gap:6px;background:var(--navy-panel);padding:5px;border-radius:8px;}
  .tabbar button{
    background:transparent;border:none;color:rgba(246,243,234,0.65);
    font-family:'IBM Plex Sans';font-size:0.88rem;font-weight:500;
    padding:9px 16px;border-radius:6px;cursor:pointer;transition:all .15s ease;
  }
  .tabbar button.active{background:var(--amber);color:var(--navy);font-weight:600;}
  .tabbar button:not(.active):hover{color:var(--paper);}
  .panel{display:none;}
  .panel.active{display:block;}

  /* ---- TRACKER ---- */
  .tracker-layout{display:grid;grid-template-columns:340px 1fr;gap:26px;}
  @media (max-width:760px){.tracker-layout{grid-template-columns:1fr;}}
  .wheel-box{position:relative;width:320px;height:320px;margin:10px auto;}
  .wheel-center{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:132px;height:132px;border-radius:50%;
    background:var(--navy-panel);border:1px solid rgba(200,155,60,0.4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:8px;
  }
  .wheel-center .pct{font-family:'Source Serif 4',serif;font-size:2rem;font-weight:700;color:var(--amber);line-height:1;}
  .wheel-center .lbl{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(246,243,234,0.6);margin-top:4px;}
  .node{
    position:absolute;width:64px;height:64px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:var(--navy-panel);border:2px solid rgba(246,243,234,0.25);
    cursor:pointer;transition:all .15s ease;font-family:'IBM Plex Mono',monospace;
  }
  .node .num{font-size:0.95rem;font-weight:600;}
  .node.done{background:var(--olive);border-color:var(--olive);}
  .node.selected{border-color:var(--amber);box-shadow:0 0 0 3px rgba(200,155,60,0.25);}
  .node:hover{border-color:var(--amber);}
  .arc-svg{position:absolute;top:0;left:0;width:100%;height:100%;}

  .detail-card{background:var(--paper);color:var(--ink);border-radius:10px;padding:22px 24px;}
  .detail-card .step-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--amber-dim);}
  .detail-card h2{font-family:'Source Serif 4',serif;margin:4px 0 6px;font-size:1.4rem;}
  .detail-card p.desc{color:var(--ink-soft);font-size:0.92rem;margin:0 0 16px;line-height:1.45;}
  .task{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--paper-dim);}
  .task:first-of-type{border-top:none;}
  .task input{margin-top:3px;width:16px;height:16px;accent-color:var(--olive);cursor:pointer;flex-shrink:0;}
  .task label{font-size:0.93rem;line-height:1.4;cursor:pointer;}
  .task.checked label{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--olive);}
  .progress-row{display:flex;align-items:center;gap:10px;margin-top:18px;font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--ink-soft);}
  .progress-track{flex:1;height:6px;background:var(--paper-dim);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--olive);border-radius:3px;transition:width .2s ease;}
  .reset-link{display:inline-block;margin-top:16px;font-size:0.78rem;color:var(--rust);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}

  /* ---- STUDY ---- */
  .study-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .score-pill{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;background:var(--navy-panel);border:1px solid var(--amber-dim);padding:6px 14px;border-radius:20px;}
  .score-pill b{color:var(--amber);}
  .card{background:var(--paper);color:var(--ink);border-radius:10px;padding:26px 26px 22px;}
  .card .cat{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:10px;}
  .card .q{font-family:'Source Serif 4',serif;font-size:1.22rem;line-height:1.4;margin:0 0 20px;}
  .choices{display:flex;flex-direction:column;gap:9px;}
  .choice{
    text-align:left;background:#fff;border:1px solid var(--paper-dim);border-radius:7px;
    padding:11px 14px;font-family:'IBM Plex Sans';font-size:0.92rem;cursor:pointer;color:var(--ink);
    transition:all .12s ease;
  }
  .choice:hover:not(.locked){border-color:var(--slateblue);}
  .choice.correct{background:rgba(91,117,83,0.15);border-color:var(--olive);font-weight:600;}
  .choice.wrong{background:rgba(166,75,60,0.13);border-color:var(--rust);}
  .explain{margin-top:16px;padding-top:14px;border-top:1px solid var(--paper-dim);font-size:0.87rem;color:var(--ink-soft);line-height:1.5;display:none;}
  .explain.show{display:block;}
  .study-nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
  .next-btn{background:var(--amber);color:var(--navy);border:none;padding:10px 20px;border-radius:7px;font-weight:600;font-size:0.88rem;cursor:pointer;}
  .next-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;}
  .filters button{background:transparent;border:1px solid rgba(246,243,234,0.3);color:rgba(246,243,234,0.75);font-size:0.75rem;padding:5px 11px;border-radius:14px;cursor:pointer;font-family:'IBM Plex Mono',monospace;}
  .filters button.active{background:var(--amber);border-color:var(--amber);color:var(--navy);}
  .done-screen{text-align:center;padding:30px 10px;}
  .done-screen .big{font-family:'Source Serif 4',serif;font-size:2.6rem;color:var(--amber);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <span class="eyebrow">SHIELD · RMF Module</span>
      <h1>Risk Management Framework</h1>
    </div>
    <div class="tabbar">
      <button id="tab-tracker" class="active">Tracker</button>
      <button id="tab-study">Study</button>
    </div>
  </header>

  <!-- TRACKER PANEL -->
  <div id="panel-tracker" class="panel active">
    <div class="tracker-layout">
      <div>
        <div class="wheel-box" id="wheel"></div>
      </div>
      <div class="detail-card" id="detailCard"></div>
    </div>
  </div>

  <!-- STUDY PANEL -->
  <div id="panel-study" class="panel">
    <div class="study-top">
      <div class="filters" id="filters"></div>
      <div class="score-pill">Score: <b id="scoreNum">0</b>/<span id="scoreTotal">0</span></div>
    </div>
    <div id="studyArea"></div>
  </div>
</div>

<script>
const STORE_KEY_TRACKER = 'rmf-tracker-checks';
const STORE_KEY_QUIZ = 'rmf-quiz-best';

const STEPS = [
  {
    id:1, name:"Prepare",
    desc:"Establish the organizational and system-level context needed to manage risk before anything else starts.",
    tasks:[
      "Identify and assign key risk management roles (AO, ISSM, ISSO, SCA)",
      "Establish an organization-wide risk management strategy and risk tolerance",
      "Complete an organizational risk assessment",
      "Identify and document common (inherited) controls",
      "Define the system's mission/business purpose and stakeholders",
      "Determine the authorization boundary for the system"
    ]
  },
  {
    id:2, name:"Categorize",
    desc:"Determine the impact levels of the system based on the information it processes, stores, and transmits.",
    tasks:[
      "Categorize the system per FIPS 199 (Low / Moderate / High for C-I-A)",
      "Document the categorization rationale in the SSP",
      "Register the system of record (e.g., in eMASS)",
      "Identify the information types processed by the system (per NIST SP 800-60)",
      "Review and approve categorization with the AO/ISSM"
    ]
  },
  {
    id:3, name:"Select",
    desc:"Choose and tailor a control baseline appropriate to the system's categorization and threat context.",
    tasks:[
      "Select the initial control baseline (Low/Mod/High) from NIST SP 800-53",
      "Tailor controls: apply overlays, scoping guidance, and compensating controls",
      "Designate common vs. hybrid vs. system-specific controls",
      "Develop the continuous monitoring strategy for the system",
      "Draft the System Security Plan (SSP) and route for approval"
    ]
  },
  {
    id:4, name:"Implement",
    desc:"Put the selected controls into practice and record exactly how each one is satisfied.",
    tasks:[
      "Implement each control per the SSP-documented approach",
      "Configure technical controls (access control, audit logging, encryption, etc.)",
      "Implement operational and management controls (policies, training, physical security)",
      "Update the SSP with implementation details and evidence references",
      "Collect initial implementation evidence for assessors"
    ]
  },
  {
    id:5, name:"Assess",
    desc:"Independently verify that implemented controls are working as intended and producing the desired outcome.",
    tasks:[
      "Develop the Security Assessment Plan (SAP)",
      "Assess controls per NIST SP 800-53A assessment procedures",
      "Document findings in the Security Assessment Report (SAR)",
      "Identify weaknesses/deficiencies and initial risk ratings",
      "Build the initial Plan of Action & Milestones (POA&M) for open items"
    ]
  },
  {
    id:6, name:"Authorize",
    desc:"Give the Authorizing Official the full risk picture so they can make a formal, risk-based decision.",
    tasks:[
      "Assemble the authorization package (SSP, SAR, POA&M, risk assessment)",
      "Brief the AO on residual risk and outstanding POA&M items",
      "AO renders a risk determination and acceptance decision",
      "Issue authorization decision (ATO, ATO with conditions, or DATO)",
      "Record authorization terms, conditions, and expiration/reauthorization date"
    ]
  },
  {
    id:7, name:"Monitor",
    desc:"Keep the authorization current by tracking the system's real security posture on an ongoing basis.",
    tasks:[
      "Execute the continuous monitoring strategy (scans, control checks, log reviews)",
      "Track system changes and assess their security impact",
      "Update the SSP, SAR, and POA&M as posture changes",
      "Report security status to the AO/ISSM on the defined cadence",
      "Maintain a decommissioning/disposal plan for system end-of-life"
    ]
  }
];

const QUIZ = [
  {cat:"Steps", q:"What are the seven steps of the RMF in order, per NIST SP 800-37 Rev 2?", choices:["Categorize, Select, Prepare, Implement, Assess, Monitor, Authorize","Prepare, Categorize, Select, Implement, Assess, Authorize, Monitor","Select, Categorize, Prepare, Assess, Implement, Authorize, Monitor","Prepare, Select, Categorize, Implement, Authorize, Assess, Monitor"], answer:1, explain:"Rev 2 added 'Prepare' as the first step, ahead of Categorize — it wasn't in the original six-step RMF."},
  {cat:"Roles", q:"Who makes the final risk-acceptance decision to grant an ATO?", choices:["ISSO","ISSM","Authorizing Official (AO)","Security Control Assessor (SCA)"], answer:2, explain:"The AO is the senior official who formally accepts residual risk on behalf of the organization."},
  {cat:"Roles", q:"Which role is primarily responsible for the day-to-day operational security of a specific system?", choices:["ISSO","AO","CISO","SCA"], answer:0, explain:"The ISSO manages security for an individual system day-to-day; the ISSM oversees the broader security program."},
  {cat:"Docs", q:"Which document captures a system's known security weaknesses and the plan/timeline to fix them?", choices:["SSP","SAR","POA&M","SAP"], answer:2, explain:"The Plan of Action & Milestones (POA&M) tracks remediation of identified weaknesses over time."},
  {cat:"Docs", q:"What does the SAR (Security Assessment Report) contain?", choices:["The control implementation narrative","Findings from independently assessing the controls","The categorization justification","The continuous monitoring schedule"], answer:1, explain:"The SAR documents the assessor's findings on whether controls are implemented correctly and working as intended."},
  {cat:"Docs", q:"Which document describes exactly how each selected control is implemented for a system?", choices:["POA&M","SAP","SSP","SAR"], answer:2, explain:"The System Security Plan (SSP) is the authoritative record of how controls are implemented."},
  {cat:"Categorize", q:"FIPS 199 categorization rates a system's impact across which three properties?", choices:["Speed, Cost, Availability","Confidentiality, Integrity, Availability","Confidentiality, Cost, Accountability","Integrity, Accountability, Access"], answer:1, explain:"C-I-A — Confidentiality, Integrity, Availability — each rated Low, Moderate, or High."},
  {cat:"Categorize", q:"If a system has Confidentiality=Moderate, Integrity=High, Availability=Low, what is its overall FIPS 199 category?", choices:["Low","Moderate","High","Average of the three"], answer:2, explain:"FIPS 199 uses the high-water mark — the overall category equals the highest of the three ratings."},
  {cat:"Authorize", q:"What does 'ATO with conditions' generally mean?", choices:["The system is denied authorization outright","Authorization is granted contingent on completing specific remediation by a set date","The system only operates during business hours","The AO has delegated the decision to the ISSM"], answer:1, explain:"It's a conditional authorization — operation is allowed while specific POA&M items are resolved on a timeline."},
  {cat:"Authorize", q:"What is a Denial of Authorization to Operate (DATO)?", choices:["A temporary pause pending more evidence","A formal decision that the system may not operate due to unacceptable risk","An automatic status after 3 years","A step that occurs before Categorize"], answer:1, explain:"A DATO means the AO has determined the risk is unacceptable and the system is not authorized to operate."},
  {cat:"Monitor", q:"What is the primary purpose of the Monitor step?", choices:["To perform the initial control assessment","To keep the authorization accurate as the system's real posture changes over time","To select the control baseline","To categorize the system"], answer:1, explain:"Monitor is ongoing — tracking changes, reassessing, and keeping the authorization package current."},
  {cat:"Controls", q:"What is a 'common control' in RMF terms?", choices:["A control unique to one system","A control inherited from a provider (e.g., a shared data center) that multiple systems rely on","A control that's always optional","A control only used during Assess"], answer:1, explain:"Common controls are implemented once at an organizational level and inherited by multiple systems."},
  {cat:"Controls", q:"Which NIST publication provides the catalog of security controls used in the Select step?", choices:["NIST SP 800-37","NIST SP 800-53","NIST SP 800-53A","NIST SP 800-60"], answer:1, explain:"NIST SP 800-53 is the control catalog; 800-53A provides the assessment procedures for those controls."},
  {cat:"Controls", q:"Which publication provides assessment procedures for verifying controls during the Assess step?", choices:["NIST SP 800-37","NIST SP 800-53A","NIST SP 800-30","FIPS 199"], answer:1, explain:"800-53A pairs with 800-53 — it tells assessors how to test whether each control is actually working."},
  {cat:"Tools", q:"What is eMASS primarily used for in DoD RMF workflows?", choices:["Writing firewall rules","Managing and tracking a system's RMF package, controls, and POA&Ms centrally","Running vulnerability scans directly","Replacing the SSP entirely"], answer:1, explain:"eMASS (Enterprise Mission Assurance Support Service) is the system of record for managing RMF packages across DoD."},
  {cat:"General", q:"Roughly how often must a system's authorization be reassessed under continuous monitoring approaches?", choices:["Once, permanently","On the cadence defined by the org's continuous monitoring strategy, not a fixed one-time event","Every 10 years exactly","Only when a breach occurs"], answer:1, explain:"Ongoing authorization relies on the continuous monitoring strategy set in the Select step, not a single point-in-time review."},
  {cat:"General", q:"What is the relationship between CMMC and RMF for a DoD contractor?", choices:["They are identical processes","CMMC verifies contractor cybersecurity maturity/compliance with NIST 800-171; RMF is the DoD system authorization process — they can overlap in a SHIELD-type environment but serve different purposes","CMMC replaces RMF entirely","RMF only applies to commercial companies"], answer:1, explain:"CMMC assesses a contractor's cybersecurity practices (largely against NIST 800-171); RMF is the framework for authorizing DoD information systems."},
  {cat:"Steps", q:"Which step involves independently verifying that implemented controls actually work as intended?", choices:["Select","Implement","Assess","Authorize"], answer:2, explain:"Assess is where an SCA tests the implemented controls against 800-53A procedures and documents results in the SAR."},
  {cat:"Categorize", q:"What's the purpose of NIST SP 800-60 in the Categorize step?", choices:["It defines control baselines","It helps identify information types and their provisional impact levels","It's the assessment methodology","It's the continuous monitoring guide"], answer:1, explain:"800-60 maps information types to provisional confidentiality/integrity/availability impact levels, feeding FIPS 199 categorization."},
  {cat:"Docs", q:"What does SAP stand for and when is it produced?", choices:["Security Authorization Package, in Authorize","Security Assessment Plan, in Assess","System Access Policy, in Prepare","Security Action Plan, in Monitor"], answer:1, explain:"The Security Assessment Plan (SAP) lays out scope, methods, and procedures before assessment begins."}
];

/* ---------- STORAGE HELPERS ---------- */
async function loadJSON(key, fallback){
  try{
    const res = await window.storage.get(key, false);
    return res ? JSON.parse(res.value) : fallback;
  }catch(e){ return fallback; }
}
async function saveJSON(key, obj){
  try{ await window.storage.set(key, JSON.stringify(obj), false); }
  catch(e){ console.error('storage save failed', e); }
}

/* ---------- TRACKER ---------- */
let checks = {}; // {stepId: [bool,...]}
let selectedStep = 1;

function totalTasks(){ return STEPS.reduce((s,st)=>s+st.tasks.length,0); }
function completedTasks(){
  let c=0;
  STEPS.forEach(st=>{ (checks[st.id]||[]).forEach(v=>{ if(v) c++; }); });
  return c;
}
function stepDone(st){
  const arr = checks[st.id]||[];
  return st.tasks.length>0 && arr.filter(Boolean).length===st.tasks.length;
}

function renderWheel(){
  const box = document.getElementById('wheel');
  box.innerHTML = '<div class="wheel-center"><div class="pct" id="pctNum">0%</div><div class="lbl">Overall</div></div>';
  const R = 128, cx=160, cy=160;
  STEPS.forEach((st,i)=>{
    const angle = (Math.PI*2 * i/STEPS.length) - Math.PI/2;
    const x = cx + R*Math.cos(angle) - 32;
    const y = cy + R*Math.sin(angle) - 32;
    const node = document.createElement('div');
    node.className = 'node' + (stepDone(st)?' done':'') + (st.id===selectedStep?' selected':'');
    node.style.left = x+'px';
    node.style.top = y+'px';
    node.innerHTML = `<div class="num">${st.id}</div>`;
    node.title = st.name;
    node.onclick = ()=>{ selectedStep = st.id; renderAll(); };
    box.appendChild(node);
  });
}

function renderDetail(){
  const st = STEPS.find(s=>s.id===selectedStep);
  const arr = checks[st.id] || (checks[st.id] = st.tasks.map(()=>false));
  const card = document.getElementById('detailCard');
  const doneCount = arr.filter(Boolean).length;
  card.innerHTML = `
    <span class="step-eyebrow">Step ${st.id} of 7</span>
    <h2>${st.name}</h2>
    <p class="desc">${st.desc}</p>
    <div id="taskList"></div>
    <div class="progress-row">
      <span>${doneCount}/${st.tasks.length}</span>
      <div class="progress-track"><div class="progress-fill" style="width:${st.tasks.length? (doneCount/st.tasks.length*100):0}%"></div></div>
    </div>
    <span class="reset-link" id="resetStep">Clear this step</span>
  `;
  const list = card.querySelector('#taskList');
  st.tasks.forEach((t,i)=>{
    const row = document.createElement('div');
    row.className = 'task' + (arr[i]?' checked':'');
    row.innerHTML = `<input type="checkbox" id="t${st.id}-${i}" ${arr[i]?'checked':''}><label for="t${st.id}-${i}">${t}</label>`;
    row.querySelector('input').onchange = (e)=>{
      arr[i] = e.target.checked;
      saveJSON(STORE_KEY_TRACKER, checks);
      renderAll();
    };
    list.appendChild(row);
  });
  card.querySelector('#resetStep').onclick = ()=>{
    checks[st.id] = st.tasks.map(()=>false);
    saveJSON(STORE_KEY_TRACKER, checks);
    renderAll();
  };
}

function renderAll(){
  renderWheel();
  renderDetail();
  const pct = totalTasks()? Math.round(completedTasks()/totalTasks()*100) : 0;
  const pctEl = document.getElementById('pctNum');
  if(pctEl) pctEl.textContent = pct+'%';
}

/* ---------- STUDY ---------- */
let quizOrder = [];
let quizIdx = 0;
let activeFilter = "All";
let sessionScore = 0;
let sessionAnswered = 0;
let bestScore = 0;
let locked = false;

function categories(){
  return ["All", ...Array.from(new Set(QUIZ.map(q=>q.cat)))];
}

function buildFilters(){
  const wrap = document.getElementById('filters');
  wrap.innerHTML = '';
  categories().forEach(c=>{
    const b = document.createElement('button');
    b.textContent = c;
    if(c===activeFilter) b.className='active';
    b.onclick = ()=>{ activeFilter=c; startQuizSet(); };
    wrap.appendChild(b);
  });
}

function startQuizSet(){
  const pool = activeFilter==="All" ? QUIZ : QUIZ.filter(q=>q.cat===activeFilter);
  quizOrder = pool.map((_,i)=>i).sort(()=>Math.random()-0.5);
  // map back to actual QUIZ objects from filtered pool
  quizOrder = pool;
  quizIdx = 0;
  sessionScore = 0;
  sessionAnswered = 0;
  buildFilters();
  document.getElementById('scoreTotal').textContent = quizOrder.length;
  document.getElementById('scoreNum').textContent = 0;
  renderQuestion();
}

function renderQuestion(){
  const area = document.getElementById('studyArea');
  if(quizIdx >= quizOrder.length){
    area.innerHTML = `<div class="card done-screen">
      <div class="big">${sessionScore}/${quizOrder.length}</div>
      <p style="color:var(--ink-soft);margin-top:6px;">Session complete.</p>
      <button class="next-btn" id="restartBtn" style="margin-top:14px;">Study again</button>
    </div>`;
    document.getElementById('restartBtn').onclick = startQuizSet;
    if(sessionScore > bestScore){
      bestScore = sessionScore;
      saveJSON(STORE_KEY_QUIZ, {best:bestScore});
    }
    return;
  }
  const q = quizOrder[quizIdx];
  locked = false;
  area.innerHTML = `
    <div class="card">
      <div class="cat">${q.cat}</div>
      <p class="q">${q.q}</p>
      <div class="choices" id="choicesWrap"></div>
      <div class="explain" id="explainBox">${q.explain}</div>
      <div class="study-nav">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:rgba(246,243,234,0.55);">Question ${quizIdx+1} of ${quizOrder.length}</span>
        <button class="next-btn" id="nextBtn" disabled>Next</button>
      </div>
    </div>
  `;
  const cWrap = document.getElementById('choicesWrap');
  q.choices.forEach((choiceText,i)=>{
    const b = document.createElement('button');
    b.className = 'choice';
    b.textContent = choiceText;
    b.onclick = ()=>{
      if(locked) return;
      locked = true;
      sessionAnswered++;
      const correct = i===q.answer;
      if(correct) sessionScore++;
      Array.from(cWrap.children).forEach((el,j)=>{
        el.classList.add('locked');
        if(j===q.answer) el.classList.add('correct');
        else if(j===i) el.classList.add('wrong');
      });
      document.getElementById('explainBox').classList.add('show');
      document.getElementById('nextBtn').disabled = false;
      document.getElementById('scoreNum').textContent = sessionScore;
    };
    cWrap.appendChild(b);
  });
  document.getElementById('nextBtn').onclick = ()=>{
    quizIdx++;
    renderQuestion();
  };
}

/* ---------- TABS ---------- */
document.getElementById('tab-tracker').onclick = ()=>{
  document.getElementById('tab-tracker').classList.add('active');
  document.getElementById('tab-study').classList.remove('active');
  document.getElementById('panel-tracker').classList.add('active');
  document.getElementById('panel-study').classList.remove('active');
};
document.getElementById('tab-study').onclick = ()=>{
  document.getElementById('tab-study').classList.add('active');
  document.getElementById('tab-tracker').classList.remove('active');
  document.getElementById('panel-study').classList.add('active');
  document.getElementById('panel-tracker').classList.remove('active');
};

/* ---------- INIT ---------- */
(async function init(){
  checks = await loadJSON(STORE_KEY_TRACKER, {});
  const quizSave = await loadJSON(STORE_KEY_QUIZ, {best:0});
  bestScore = quizSave.best || 0;
  renderAll();
  buildFilters();
  startQuizSet();
})();
</script>
